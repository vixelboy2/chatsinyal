<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinyal — Chat 1-on-1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110d;
    --surface:#1f1a14;
    --surface-2:#2a2319;
    --surface-3:#352c1f;
    --accent:#ff8c3a;
    --accent-dim:#c96a28;
    --accent-soft:rgba(255,140,58,0.14);
    --pending:#8a7f5e;
    --text:#f3ede0;
    --text-muted:#a89c87;
    --danger:#e8553f;
    --line:#352e23;
    --radius:14px;
    --mono:'Space Mono', monospace;
    --sans:'Plus Jakarta Sans', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% 0%, rgba(255,140,58,0.07), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:0;
  }
  #app{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:var(--surface);
    display:flex;
    flex-direction:column;
    position:relative;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
  }

  /* ---------- shared bits ---------- */
  .header{
    padding:18px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    background:var(--surface);
    position:sticky;
    top:0;
    z-index:5;
  }
  .brand{
    font-family:var(--mono);
    font-weight:700;
    letter-spacing:3px;
    font-size:14px;
    color:var(--accent);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 8px var(--accent);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

  .waveform{display:flex;gap:3px;align-items:flex-end;height:18px;}
  .waveform span{
    width:3px;background:var(--accent);border-radius:2px;
    animation:wave 1.1s ease-in-out infinite;
    transform-origin:bottom;
  }
  .waveform span:nth-child(1){height:6px;animation-delay:0s;}
  .waveform span:nth-child(2){height:14px;animation-delay:.12s;}
  .waveform span:nth-child(3){height:10px;animation-delay:.24s;}
  .waveform span:nth-child(4){height:16px;animation-delay:.36s;}
  .waveform span:nth-child(5){height:8px;animation-delay:.48s;}
  @keyframes wave{0%,100%{transform:scaleY(0.35);}50%{transform:scaleY(1);}}

  .btn{
    font-family:var(--sans);
    font-weight:700;
    font-size:14px;
    border:none;
    border-radius:10px;
    padding:13px 18px;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#1a1209;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--line);}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent-dim);}
  .btn-block{width:100%;}
  .btn-sm{padding:9px 14px;font-size:13px;border-radius:8px;}

  input.field{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:var(--sans);
    font-size:15px;
    padding:13px 14px;
    border-radius:10px;
    outline:none;
  }
  input.field:focus{border-color:var(--accent-dim);}
  input.field-id{font-family:var(--mono);letter-spacing:3px;font-size:18px;}
  input.field::placeholder{color:#6b6253;}

  .error-text{color:var(--danger);font-size:13px;margin-top:8px;}
  .muted{color:var(--text-muted);}

  /* ---------- onboarding ---------- */
  .onboard{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:36px 28px;
    gap:28px;
  }
  .onboard-hero{text-align:center;}
  .onboard-hero .freq{
    font-family:var(--mono);
    font-size:13px;
    color:var(--accent);
    letter-spacing:4px;
    margin-bottom:10px;
  }
  .onboard-hero h1{
    font-size:34px;
    margin:0 0 6px 0;
    letter-spacing:-0.5px;
    font-weight:800;
  }
  .onboard-hero p{
    color:var(--text-muted);
    font-size:15px;
    margin:0;
    line-height:1.5;
  }
  .onboard-wave{display:flex;justify-content:center;margin:18px 0 4px;}
  .onboard-actions{display:flex;flex-direction:column;gap:12px;}
  .field-group{display:flex;flex-direction:column;gap:10px;}
  .label{font-size:13px;color:var(--text-muted);font-weight:600;letter-spacing:0.3px;}
  .link-row{text-align:center;font-size:13px;color:var(--text-muted);margin-top:4px;}
  .link-row a{color:var(--accent);text-decoration:none;cursor:pointer;font-weight:600;}

  .id-reveal{
    background:var(--surface-2);
    border:1px dashed var(--accent-dim);
    border-radius:var(--radius);
    padding:22px;
    text-align:center;
  }
  .id-reveal .idval{
    font-family:var(--mono);
    font-size:32px;
    font-weight:700;
    letter-spacing:6px;
    color:var(--accent);
    text-shadow:0 0 18px rgba(255,140,58,0.45);
    margin:8px 0 14px 0;
  }

  /* ---------- home ---------- */
  .home-id-bar{
    margin:16px 20px 6px 20px;
    background:var(--surface-2);
    border-radius:12px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .home-id-bar .idtext{
    font-family:var(--mono);
    font-size:17px;
    letter-spacing:3px;
    color:var(--accent);
  }
  .home-id-bar .idlabel{font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-bottom:3px;}

  .section-title{
    padding:18px 20px 8px 20px;
    font-size:12px;
    letter-spacing:1.5px;
    color:var(--text-muted);
    font-weight:700;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .scroll-area{flex:1;overflow-y:auto;padding-bottom:24px;}

  .add-panel{
    margin:0 20px 8px 20px;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .person-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 20px;
    cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .person-row:hover{background:var(--surface-2);}
  .avatar{
    width:42px;height:42px;border-radius:50%;
    background:var(--surface-3);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;color:var(--accent);
    font-size:15px;flex-shrink:0;
  }
  .person-info{flex:1;min-width:0;}
  .person-name{font-weight:700;font-size:15px;}
  .person-sub{font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .person-meta{font-size:11px;color:var(--text-muted);text-align:right;flex-shrink:0;}
  .empty-state{padding:18px 20px 28px 20px;color:var(--text-muted);font-size:14px;line-height:1.6;}

  /* ---------- chat ---------- */
  .chat-header{
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--surface);z-index:5;
  }
  .icon-btn{
    background:none;border:none;color:var(--text-muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    padding:6px;border-radius:8px;
  }
  .icon-btn:hover{color:var(--accent);background:var(--surface-2);}
  .chat-name{font-weight:700;font-size:15px;}
  .chat-status{font-size:11px;color:var(--accent);letter-spacing:0.5px;}

  .messages{
    flex:1;
    overflow-y:auto;
    padding:18px 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{
    max-width:78%;
    padding:10px 13px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.45;
    word-wrap:break-word;
  }
  .msg-mine{
    align-self:flex-end;
    background:var(--accent);
    color:#1a1209;
    border-bottom-right-radius:4px;
  }
  .msg-theirs{
    align-self:flex-start;
    background:var(--surface-2);
    color:var(--text);
    border-bottom-left-radius:4px;
  }
  .msg-time{font-size:10px;opacity:0.6;margin-top:4px;display:block;}
  .chat-empty{margin:auto;text-align:center;color:var(--text-muted);font-size:14px;padding:0 30px;line-height:1.6;}

  .composer{
    display:flex;
    gap:10px;
    padding:14px 16px;
    border-top:1px solid var(--line);
    background:var(--surface);
  }
  .composer input{flex:1;}
  .send-btn{
    background:var(--accent);
    border:none;
    color:#1a1209;
    width:46px;height:46px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
  }
  .send-btn:active{transform:scale(0.93);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:6px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============ storage helpers ============ */
async function getJSON(key, shared){
  try{
    const r = await window.storage.get(key, shared);
    return r && r.value ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function setJSON(key, value, shared){
  try{ await window.storage.set(key, JSON.stringify(value), shared); }
  catch(e){ console.error('storage set failed', e); }
}
function pairKey(a,b){ return [a,b].sort().join('_'); }
function formatId(id){ return id ? id.slice(0,3)+' '+id.slice(3) : ''; }
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
}
function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

/* ============ state ============ */
let state = {
  view:'loading',          // loading | onboarding | home | chat
  onboardMode:'choice',    // choice | create | login
  me:null,
  error:'',
  busy:false,
  showAddPanel:false,
  addFriendInput:'',
  mutualList:[],
  pendingList:[],
  incomingList:[],
  activeChat:null,         // {id, name}
  messages:[],
  draftText:'',
  pollInterval:null,
};

function clearPoll(){ if(state.pollInterval){ clearInterval(state.pollInterval); state.pollInterval=null; } }

/* ============ init ============ */
async function init(){
  try{
    const r = await window.storage.get('my-profile', false);
    if(r && r.value){
      state.me = JSON.parse(r.value);
      await goHome();
      return;
    }
  }catch(e){ /* no profile yet */ }
  state.view='onboarding';
  render();
}

/* ============ onboarding actions ============ */
function setOnboardMode(mode){ state.error=''; state.onboardMode=mode; render(); }

async function createAccount(){
  const nameInput = document.getElementById('name-input');
  const name = nameInput ? nameInput.value.trim() : '';
  if(!name){ state.error='Nama tidak boleh kosong.'; render(); return; }
  state.busy=true; state.error=''; render();

  let id, exists=true, tries=0;
  while(exists && tries<6){
    id = String(Math.floor(100000+Math.random()*900000));
    exists = await getJSON('users:'+id, true);
    tries++;
  }
  await setJSON('users:'+id, {id, name, createdAt:Date.now()}, true);
  state.me = {id, name};
  await setJSON('my-profile', state.me, false);
  state.busy=false;
  state.onboardMode='created';
  render();
}

async function loginWithId(){
  const idInput = document.getElementById('login-id-input');
  const id = idInput ? idInput.value.trim() : '';
  if(!/^\d{6}$/.test(id)){ state.error='Masukkan ID 6 digit yang valid.'; render(); return; }
  state.busy=true; state.error=''; render();
  const user = await getJSON('users:'+id, true);
  state.busy=false;
  if(!user){ state.error='ID tidak ditemukan.'; render(); return; }
  state.me = {id:user.id, name:user.name};
  await setJSON('my-profile', state.me, false);
  await goHome();
}

async function finishOnboarding(){ await goHome(); }

async function logout(){
  clearPoll();
  try{ await window.storage.delete('my-profile', false); }catch(e){}
  state.me=null; state.view='onboarding'; state.onboardMode='choice'; state.error='';
  render();
}

/* ============ home ============ */
async function goHome(){
  state.view='home';
  state.showAddPanel=false;
  await loadHomeData();
  render();
  clearPoll();
  state.pollInterval = setInterval(async ()=>{
    if(state.view==='home' && !state.showAddPanel){
      await loadHomeData();
      render();
    }
  }, 6000);
}

async function loadHomeData(){
  const myId = state.me.id;
  const following = await getJSON('following:'+myId, true) || [];
  const followers = await getJSON('followers:'+myId, true) || [];

  const mutualIds = following.filter(id=>followers.includes(id));
  const pendingIds = following.filter(id=>!followers.includes(id));
  const incomingIds = followers.filter(id=>!following.includes(id));

  state.mutualList = await Promise.all(mutualIds.map(async id=>{
    const u = await getJSON('users:'+id, true);
    const msgs = await getJSON('chats:'+pairKey(myId,id), true) || [];
    const last = msgs.length ? msgs[msgs.length-1] : null;
    return {
      id, name: u ? u.name : 'Pengguna',
      lastText: last ? last.text : null,
      lastTs: last ? last.ts : 0,
      lastMine: last ? last.from===myId : false,
    };
  }));
  state.mutualList.sort((a,b)=> b.lastTs - a.lastTs);

  state.pendingList = await Promise.all(pendingIds.map(async id=>{
    const u = await getJSON('users:'+id, true);
    return {id, name: u ? u.name : 'Pengguna'};
  }));

  state.incomingList = await Promise.all(incomingIds.map(async id=>{
    const u = await getJSON('users:'+id, true);
    return {id, name: u ? u.name : 'Pengguna'};
  }));
}

function toggleAddPanel(){ state.showAddPanel=!state.showAddPanel; state.error=''; state.addFriendInput=''; render(); }

async function addFriendAction(){
  const input = document.getElementById('add-friend-input');
  const targetId = input ? input.value.trim() : '';
  if(!/^\d{6}$/.test(targetId)){ state.error='Masukkan ID 6 digit yang valid.'; render(); return; }
  if(targetId === state.me.id){ state.error='Tidak bisa menambahkan ID sendiri.'; render(); return; }

  state.busy=true; render();
  const targetUser = await getJSON('users:'+targetId, true);
  if(!targetUser){
    state.busy=false; state.error='ID tidak ditemukan.'; render(); return;
  }

  const myId = state.me.id;
  let myFollowing = await getJSON('following:'+myId, true) || [];
  if(!myFollowing.includes(targetId)){
    myFollowing.push(targetId);
    await setJSON('following:'+myId, myFollowing, true);
  }
  let theirFollowers = await getJSON('followers:'+targetId, true) || [];
  if(!theirFollowers.includes(myId)){
    theirFollowers.push(myId);
    await setJSON('followers:'+targetId, theirFollowers, true);
  }

  state.busy=false; state.showAddPanel=false; state.error='';
  await loadHomeData();
  render();
}

async function addBack(id){
  state.busy=true; render();
  const myId = state.me.id;
  let myFollowing = await getJSON('following:'+myId, true) || [];
  if(!myFollowing.includes(id)){ myFollowing.push(id); await setJSON('following:'+myId, myFollowing, true); }
  let theirFollowers = await getJSON('followers:'+id, true) || [];
  if(!theirFollowers.includes(myId)){ theirFollowers.push(myId); await setJSON('followers:'+id, theirFollowers, true); }
  state.busy=false;
  await loadHomeData();
  render();
}

function copyMyId(){
  const text = state.me.id;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{});
  }
  const el = document.getElementById('copy-feedback');
  if(el){ el.textContent='Disalin!'; setTimeout(()=>{ if(el) el.textContent='Salin'; }, 1500); }
}

/* ============ chat ============ */
async function openChat(id, name){
  clearPoll();
  state.view='chat';
  state.activeChat={id, name};
  state.draftText='';
  await refreshMessages();
  render();
  state.pollInterval = setInterval(async ()=>{
    if(state.view==='chat') await refreshMessages(true);
  }, 4000);
}

async function refreshMessages(rerender){
  if(!state.activeChat) return;
  const key = 'chats:'+pairKey(state.me.id, state.activeChat.id);
  state.messages = await getJSON(key, true) || [];
  if(rerender) render();
}

async function sendMessage(){
  const text = state.draftText.trim();
  if(!text || !state.activeChat) return;
  state.draftText='';
  const key = 'chats:'+pairKey(state.me.id, state.activeChat.id);
  const msgs = await getJSON(key, true) || [];
  msgs.push({from: state.me.id, text, ts: Date.now()});
  await setJSON(key, msgs, true);
  state.messages = msgs;
  render();
}

function onComposerInput(val){ state.draftText = val; }
function onComposerKey(e){ if(e.key==='Enter'){ sendMessage(); } }

async function backToHome(){
  clearPoll();
  await goHome();
}

/* ============ render ============ */
function render(){
  const app = document.getElementById('app');
  if(state.view==='loading'){
    app.innerHTML = `<div class="onboard"><div class="onboard-wave">${waveHtml()}</div></div>`;
    return;
  }
  if(state.view==='onboarding'){ app.innerHTML = renderOnboarding(); attachOnboardingHandlers(); return; }
  if(state.view==='home'){ app.innerHTML = renderHome(); attachHomeHandlers(); return; }
  if(state.view==='chat'){ app.innerHTML = renderChat(); attachChatHandlers(); scrollMessagesToBottom(); return; }
}

function waveHtml(){
  return `<div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>`;
}

function renderOnboarding(){
  const mode = state.onboardMode;
  const errorHtml = state.error ? `<div class="error-text">${escapeHtml(state.error)}</div>` : '';

  if(mode==='choice'){
    return `
      <div class="onboard">
        <div class="onboard-hero">
          <div class="freq">— S I N Y A L —</div>
          <h1>Sinyal</h1>
          <p>Ngobrol 1-on-1. Tiap orang punya ID sendiri,<br>saling tambahkan ID untuk mulai terhubung.</p>
        </div>
        <div class="onboard-wave">${waveHtml()}</div>
        <div class="onboard-actions">
          <button class="btn btn-primary btn-block" id="go-create">Buat ID Baru</button>
          <button class="btn btn-ghost btn-block" id="go-login">Masuk dengan ID</button>
        </div>
      </div>`;
  }

  if(mode==='create'){
    return `
      <div class="onboard">
        <div class="onboard-hero">
          <div class="freq">BUAT ID</div>
          <h1 style="font-size:26px;">Siapa nama kamu?</h1>
          <p>Nama ini yang akan dilihat orang lain saat terhubung denganmu.</p>
        </div>
        <div class="field-group">
          <input class="field" id="name-input" placeholder="Nama kamu" autofocus>
          ${errorHtml}
        </div>
        <div class="onboard-actions">
          <button class="btn btn-primary btn-block" id="submit-create" ${state.busy?'disabled':''}>${state.busy?'Membuat…':'Buat ID'}</button>
          <div class="link-row"><a id="back-choice">← Kembali</a></div>
        </div>
      </div>`;
  }

  if(mode==='created'){
    return `
      <div class="onboard">
        <div class="onboard-hero">
          <div class="freq">BERHASIL</div>
          <h1 style="font-size:26px;">ID kamu siap</h1>
          <p>Simpan ID ini. Bagikan ke teman supaya mereka bisa menambahkanmu.</p>
        </div>
        <div class="id-reveal">
          <div class="muted" style="font-size:12px;letter-spacing:1px;">ID FREKUENSI KAMU</div>
          <div class="idval">${formatId(state.me.id)}</div>
          <button class="btn btn-ghost btn-sm" id="copy-created-id">Salin ID</button>
        </div>
        <button class="btn btn-primary btn-block" id="enter-app">Lanjut ke Sinyal</button>
      </div>`;
  }

  if(mode==='login'){
    return `
      <div class="onboard">
        <div class="onboard-hero">
          <div class="freq">MASUK</div>
          <h1 style="font-size:26px;">Masukkan ID kamu</h1>
          <p>Sudah punya ID dari perangkat lain? Masuk di sini.</p>
        </div>
        <div class="field-group">
          <input class="field field-id" id="login-id-input" placeholder="000000" maxlength="6" inputmode="numeric" autofocus>
          ${errorHtml}
        </div>
        <div class="onboard-actions">
          <button class="btn btn-primary btn-block" id="submit-login" ${state.busy?'disabled':''}>${state.busy?'Memeriksa…':'Masuk'}</button>
          <div class="link-row"><a id="back-choice2">← Kembali</a></div>
        </div>
      </div>`;
  }
}

function attachOnboardingHandlers(){
  const byId = id => document.getElementById(id);
  if(byId('go-create')) byId('go-create').onclick = ()=>setOnboardMode('create');
  if(byId('go-login')) byId('go-login').onclick = ()=>setOnboardMode('login');
  if(byId('back-choice')) byId('back-choice').onclick = ()=>setOnboardMode('choice');
  if(byId('back-choice2')) byId('back-choice2').onclick = ()=>setOnboardMode('choice');
  if(byId('submit-create')) byId('submit-create').onclick = createAccount;
  if(byId('submit-login')) byId('submit-login').onclick = loginWithId;
  if(byId('copy-created-id')) byId('copy-created-id').onclick = copyMyId;
  if(byId('enter-app')) byId('enter-app').onclick = finishOnboarding;
  const nameInput = byId('name-input');
  if(nameInput) nameInput.onkeydown = e=>{ if(e.key==='Enter') createAccount(); };
  const loginInput = byId('login-id-input');
  if(loginInput) loginInput.onkeydown = e=>{ if(e.key==='Enter') loginWithId(); };
}

function renderHome(){
  const addPanel = state.showAddPanel ? `
    <div class="add-panel">
      <div class="label">Tambah teman lewat ID</div>
      <input class="field field-id" id="add-friend-input" placeholder="000000" maxlength="6" inputmode="numeric" value="${escapeHtml(state.addFriendInput)}" autofocus>
      ${state.error ? `<div class="error-text">${escapeHtml(state.error)}</div>` : ''}
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary btn-sm" id="submit-add-friend" style="flex:1;" ${state.busy?'disabled':''}>${state.busy?'Memeriksa…':'Tambahkan'}</button>
        <button class="btn btn-ghost btn-sm" id="cancel-add-friend">Batal</button>
      </div>
    </div>` : '';

  const incomingHtml = state.incomingList.length ? `
    <div class="section-title">Permintaan masuk</div>
    ${state.incomingList.map(p=>`
      <div class="person-row" data-incoming="${p.id}">
        <div class="avatar">${initials(p.name)}</div>
        <div class="person-info">
          <div class="person-name">${escapeHtml(p.name)}</div>
          <div class="person-sub">ID ${formatId(p.id)} menambahkanmu</div>
        </div>
        <button class="btn btn-primary btn-sm addback-btn" data-id="${p.id}">Tambah balik</button>
      </div>`).join('')}
  ` : '';

  const mutualHtml = `
    <div class="section-title">Terhubung</div>
    ${state.mutualList.length ? state.mutualList.map(p=>`
      <div class="person-row open-chat" data-id="${p.id}" data-name="${escapeHtml(p.name)}">
        <div class="avatar">${initials(p.name)}</div>
        <div class="person-info">
          <div class="person-name">${escapeHtml(p.name)}</div>
          <div class="person-sub">${p.lastText ? (p.lastMine?'Kamu: ':'') + escapeHtml(p.lastText) : 'Belum ada pesan'}</div>
        </div>
        <div class="person-meta">${p.lastTs ? fmtTime(p.lastTs) : ''}</div>
      </div>`).join('') : `<div class="empty-state">Belum ada koneksi. Tambahkan ID teman untuk mulai mengobrol.</div>`}
  `;

  const pendingHtml = state.pendingList.length ? `
    <div class="section-title">Menunggu balasan</div>
    ${state.pendingList.map(p=>`
      <div class="person-row">
        <div class="avatar">${initials(p.name)}</div>
        <div class="person-info">
          <div class="person-name">${escapeHtml(p.name)}</div>
          <div class="person-sub">Menunggu mereka menambahkanmu balik</div>
        </div>
      </div>`).join('')}
  ` : '';

  return `
    <div class="header">
      <div class="brand"><span class="dot"></span>SINYAL</div>
      <button class="icon-btn" id="logout-btn" title="Keluar">${iconLogout()}</button>
    </div>
    <div class="home-id-bar">
      <div>
        <div class="idlabel">ID KAMU</div>
        <div class="idtext">${formatId(state.me.id)}</div>
      </div>
      <button class="btn btn-ghost btn-sm" id="copy-home-id"><span id="copy-feedback">Salin</span></button>
    </div>
    <div class="scroll-area">
      <div style="padding:0 20px;">
        <button class="btn btn-primary btn-block" id="toggle-add-panel" style="margin-top:10px;">
          ${state.showAddPanel ? 'Tutup' : '+ Tambah Teman'}
        </button>
      </div>
      <div style="margin-top:10px;">${addPanel}</div>
      ${incomingHtml}
      ${mutualHtml}
      ${pendingHtml}
    </div>`;
}

function attachHomeHandlers(){
  const byId = id => document.getElementById(id);
  if(byId('logout-btn')) byId('logout-btn').onclick = logout;
  if(byId('copy-home-id')) byId('copy-home-id').onclick = copyMyId;
  if(byId('toggle-add-panel')) byId('toggle-add-panel').onclick = toggleAddPanel;
  if(byId('submit-add-friend')) byId('submit-add-friend').onclick = addFriendAction;
  if(byId('cancel-add-friend')) byId('cancel-add-friend').onclick = toggleAddPanel;
  const addInput = byId('add-friend-input');
  if(addInput){
    addInput.oninput = e=>{ state.addFriendInput = e.target.value; };
    addInput.onkeydown = e=>{ if(e.key==='Enter') addFriendAction(); };
  }
  document.querySelectorAll('.addback-btn').forEach(btn=>{
    btn.onclick = ()=> addBack(btn.getAttribute('data-id'));
  });
  document.querySelectorAll('.open-chat').forEach(row=>{
    row.onclick = ()=> openChat(row.getAttribute('data-id'), row.getAttribute('data-name'));
  });
}

function renderChat(){
  const c = state.activeChat;
  const msgsHtml = state.messages.length ? state.messages.map(m=>{
    const mine = m.from === state.me.id;
    return `<div class="msg ${mine?'msg-mine':'msg-theirs'}">${escapeHtml(m.text)}<span class="msg-time">${fmtTime(m.ts)}</span></div>`;
  }).join('') : `<div class="chat-empty">Belum ada pesan dengan ${escapeHtml(c.name)}.<br>Kirim pesan pertama untuk mulai mengobrol.</div>`;

  return `
    <div class="chat-header">
      <button class="icon-btn" id="back-home-btn">${iconBack()}</button>
      <div class="avatar">${initials(c.name)}</div>
      <div>
        <div class="chat-name">${escapeHtml(c.name)}</div>
        <div class="chat-status">terhubung</div>
      </div>
    </div>
    <div class="messages" id="messages-container">${msgsHtml}</div>
    <div class="composer">
      <input class="field" id="composer-input" placeholder="Tulis pesan…" value="${escapeHtml(state.draftText)}">
      <button class="send-btn" id="send-btn">${iconSend()}</button>
    </div>`;
}

function attachChatHandlers(){
  const byId = id => document.getElementById(id);
  if(byId('back-home-btn')) byId('back-home-btn').onclick = backToHome;
  if(byId('send-btn')) byId('send-btn').onclick = sendMessage;
  const input = byId('composer-input');
  if(input){
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
    input.oninput = e=>{ state.draftText = e.target.value; };
    input.onkeydown = e=>{ if(e.key==='Enter') sendMessage(); };
  }
}

function scrollMessagesToBottom(){
  const el = document.getElementById('messages-container');
  if(el) el.scrollTop = el.scrollHeight;
}

/* ============ utils ============ */
function escapeHtml(str){
  if(str==null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function iconLogout(){
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`;
}
function iconBack(){
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
}
function iconSend(){
  return `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1a1209" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
}

init();
</script>
</body>
</html>
